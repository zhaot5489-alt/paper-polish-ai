<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Text Polishing</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-50 min-h-screen font-sans">

  <div class="max-w-3xl mx-auto px-6 py-12">

    <h1 class="text-2xl font-semibold text-slate-800 mb-8">
      Academic Text Polishing
    </h1>

    <div class="space-y-6">

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">
          Your text
        </label>

        <textarea
          id="input-text"
          rows="8"
          placeholder="Paste or type your academic text here..."
          class="w-full px-4 py-3 rounded-lg border border-slate-300 bg-white text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-500"
        ></textarea>
      </div>

      <button
        id="polish-btn"
        class="px-6 py-3 bg-slate-800 text-white font-medium rounded-lg hover:bg-slate-700 transition disabled:opacity-60"
      >
        Polish Text
      </button>

      <div>
        <label class="block text-sm font-medium text-slate-700 mb-2">
          Polished result
        </label>

        <div
          id="result-text"
          class="w-full min-h-[200px] px-4 py-3 rounded-lg border border-slate-200 bg-white text-slate-800"
        ></div>
      </div>

    </div>
  </div>

<script>

const polishBtn = document.getElementById('polish-btn');
const resultEl = document.getElementById('result-text');
const inputEl = document.getElementById('input-text');

polishBtn.addEventListener('click', async () => {

  const input = inputEl.value.trim();

  if (!input) {
    resultEl.textContent = "请输入需要润色的内容";
    resultEl.classList.add('text-slate-500');
    return;
  }

  resultEl.classList.remove('text-slate-500','text-red-600');
  resultEl.textContent = "润色中...";
  polishBtn.disabled = true;

  try {

    const res = await fetch('/api/polish', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        text: input
      })
    });

    const data = await res.json();

    if (!res.ok) {
      resultEl.textContent = data.error || "润色失败，请稍后重试";
      resultEl.classList.add('text-red-600');
      return;
    }

    resultEl.textContent = data.polished || "";

  } catch (err) {

    resultEl.textContent = "润色失败，请稍后重试";
    resultEl.classList.add('text-red-600');

  } finally {

    polishBtn.disabled = false;

  }

});

</script>

</body>
</html>
