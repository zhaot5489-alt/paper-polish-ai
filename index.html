<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学术文本润色</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#f7f7fb] text-slate-800 font-sans">
  <div class="max-w-7xl mx-auto px-4 py-8 md:px-6 md:py-10">
    <header class="mb-8">
      <div class="flex items-center gap-3 mb-2">
        <div class="w-10 h-10 rounded-xl bg-blue-600 text-white flex items-center justify-center text-lg font-bold shadow-sm">
          A
        </div>
        <div>
          <h1 class="text-2xl md:text-3xl font-semibold text-slate-900">学术文本润色</h1>
          <p class="text-sm text-slate-500 mt-1">适用于论文、摘要、回复审稿人等学术写作场景</p>
        </div>
      </div>
    </header>

    <main class="grid grid-cols-1 lg:grid-cols-2 gap-5">
      <!-- 左侧输入区 -->
      <section class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="px-5 py-4 border-b border-slate-200 bg-white">
          <div class="flex items-center justify-between gap-3">
            <div>
              <h2 class="text-base font-semibold text-slate-900">原文</h2>
              <p class="text-sm text-slate-500 mt-1">输入你需要润色的英文文本</p>
            </div>
            <div id="char-count" class="text-xs text-slate-500">0 / 3000</div>
          </div>
        </div>

        <div class="p-5">
          <textarea
            id="input-text"
            rows="16"
            placeholder="请输入或粘贴需要润色的英文内容..."
            class="w-full resize-none rounded-xl border border-slate-200 bg-white px-4 py-4 text-[15px] leading-7 text-slate-800 placeholder-slate-400 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition"
          ></textarea>

          <div class="mt-4">
            <div class="text-sm font-medium text-slate-700 mb-3">润色模式</div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
              <label class="group cursor-pointer">
                <div class="rounded-xl border border-slate-200 p-4 hover:border-blue-300 hover:bg-blue-50/40 transition">
                  <div class="flex items-start gap-3">
                    <input type="radio" name="mode" value="light" checked class="mt-1 accent-blue-600">
                    <div>
                      <div class="font-medium text-slate-900">轻度润色</div>
                      <div class="text-sm text-slate-500 mt-1 leading-6">
                        尽量保留原意和原句式，主要修正语法、用词、标点和细小表达问题。
                      </div>
                    </div>
                  </div>
                </div>
              </label>

              <label class="group cursor-pointer">
                <div class="rounded-xl border border-slate-200 p-4 hover:border-blue-300 hover:bg-blue-50/40 transition">
                  <div class="flex items-start gap-3">
                    <input type="radio" name="mode" value="deep" class="mt-1 accent-blue-600">
                    <div>
                      <div class="font-medium text-slate-900">深度润色</div>
                      <div class="text-sm text-slate-500 mt-1 leading-6">
                        在不改变原意的前提下，显著提升学术性、凝练度和 SCI 风格。
                      </div>
                    </div>
                  </div>
                </div>
              </label>
            </div>

            <p id="limit-tip" class="mt-3 text-xs text-slate-500">
              最多支持 3000 个字符。
            </p>
          </div>

          <div class="mt-5 flex flex-wrap gap-3">
            <button
              id="polish-btn"
              class="inline-flex items-center justify-center px-6 py-3 rounded-xl bg-blue-600 text-white text-sm font-medium hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-100 disabled:opacity-60 disabled:cursor-not-allowed transition"
            >
              开始润色
            </button>

            <button
              id="clear-btn"
              class="inline-flex items-center justify-center px-6 py-3 rounded-xl border border-slate-200 bg-white text-slate-700 text-sm font-medium hover:bg-slate-50 focus:outline-none focus:ring-4 focus:ring-slate-100 transition"
            >
              清空内容
            </button>
          </div>
        </div>
      </section>

      <!-- 右侧结果区 -->
      <section class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="px-5 py-4 border-b border-slate-200 bg-white">
          <div class="flex items-center justify-between gap-3">
            <div>
              <h2 class="text-base font-semibold text-slate-900">润色结果</h2>
              <p class="text-sm text-slate-500 mt-1">系统将返回优化后的英文表达</p>
            </div>
            <div id="status-text" class="text-xs text-slate-500">就绪</div>
          </div>
        </div>

        <div class="p-5 flex flex-col min-h-[580px]">
          <div
            id="result-text"
            class="flex-1 rounded-xl border border-slate-200 bg-[#fafbff] px-4 py-4 text-[15px] leading-7 text-slate-800 whitespace-pre-wrap"
          ></div>

          <div class="mt-5 flex flex-wrap gap-3">
            <button
              id="copy-btn"
              class="inline-flex items-center justify-center px-6 py-3 rounded-xl border border-slate-200 bg-white text-slate-700 text-sm font-medium hover:bg-slate-50 focus:outline-none focus:ring-4 focus:ring-slate-100 transition"
            >
              复制结果
            </button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const inputEl = document.getElementById("input-text");
    const charCountEl = document.getElementById("char-count");
    const limitTipEl = document.getElementById("limit-tip");
    const polishBtn = document.getElementById("polish-btn");
    const clearBtn = document.getElementById("clear-btn");
    const copyBtn = document.getElementById("copy-btn");
    const resultEl = document.getElementById("result-text");
    const statusTextEl = document.getElementById("status-text");

    const MAX_CHARS = 3000;

    function updateCharCount() {
      const length = inputEl.value.length;
      charCountEl.textContent = `${length} / ${MAX_CHARS}`;

      if (length > MAX_CHARS) {
        charCountEl.classList.remove("text-slate-500");
        charCountEl.classList.add("text-red-600");
        limitTipEl.textContent = "内容超出限制，请控制在 3000 个字符以内。";
        limitTipEl.classList.remove("text-slate-500");
        limitTipEl.classList.add("text-red-600");
      } else {
        charCountEl.classList.remove("text-red-600");
        charCountEl.classList.add("text-slate-500");
        limitTipEl.textContent = "最多支持 3000 个字符。";
        limitTipEl.classList.remove("text-red-600");
        limitTipEl.classList.add("text-slate-500");
      }
    }

    inputEl.addEventListener("input", updateCharCount);
    updateCharCount();

    polishBtn.addEventListener("click", async function () {
      const text = inputEl.value.trim();
      const mode = document.querySelector('input[name="mode"]:checked').value;

      resultEl.classList.remove("text-red-600");

      if (!text) {
        resultEl.textContent = "请输入需要润色的内容。";
        resultEl.classList.add("text-red-600");
        statusTextEl.textContent = "未输入";
        return;
      }

      if (text.length > MAX_CHARS) {
        resultEl.textContent = "文本过长，请控制在 3000 个字符以内。";
        resultEl.classList.add("text-red-600");
        statusTextEl.textContent = "超出限制";
        return;
      }

      polishBtn.disabled = true;
      statusTextEl.textContent = "润色中...";
      resultEl.textContent = "正在润色，请稍候...";

      try {
        const response = await fetch("/api/polish", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text, mode })
        });

        const data = await response.json();

        if (!response.ok) {
          resultEl.textContent = data.error || "润色失败，请稍后重试。";
          resultEl.classList.add("text-red-600");
          statusTextEl.textContent = "失败";
          return;
        }

        resultEl.textContent = data.polished || "";
        statusTextEl.textContent = "已完成";
      } catch (error) {
        resultEl.textContent = "润色失败，请稍后重试。";
        resultEl.classList.add("text-red-600");
        statusTextEl.textContent = "错误";
      } finally {
        polishBtn.disabled = false;
      }
    });

    clearBtn.addEventListener("click", function () {
      inputEl.value = "";
      resultEl.textContent = "";
      statusTextEl.textContent = "就绪";
      resultEl.classList.remove("text-red-600");
      updateCharCount();
    });

    copyBtn.addEventListener("click", async function () {
      const text = resultEl.textContent.trim();

      if (!text) {
        statusTextEl.textContent = "无可复制内容";
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        const oldText = copyBtn.textContent;
        copyBtn.textContent = "已复制";
        statusTextEl.textContent = "复制成功";

        setTimeout(() => {
          copyBtn.textContent = oldText;
          statusTextEl.textContent = "已完成";
        }, 1500);
      } catch (error) {
        statusTextEl.textContent = "复制失败";
      }
    });
  </script>
</body>
</html>
