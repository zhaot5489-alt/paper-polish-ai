<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Academic Text Polishing</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 font-sans text-slate-800">
  <div class="max-w-4xl mx-auto px-4 py-10">
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
      <div class="px-6 py-5 border-b border-slate-200 bg-slate-50">
        <h1 class="text-2xl font-semibold">Academic Text Polishing</h1>
        <p class="mt-2 text-sm text-slate-600">
          Improve academic writing with light polishing or deeper SCI-style refinement.
        </p>
      </div>

      <div class="p-6 space-y-6">
        <div>
          <div class="flex items-center justify-between mb-2">
            <label for="input-text" class="block text-sm font-medium text-slate-700">
              Your text
            </label>
            <span id="char-count" class="text-xs text-slate-500">0 / 3000</span>
          </div>

          <textarea
            id="input-text"
            rows="10"
            placeholder="Paste or type your academic text here..."
            class="w-full px-4 py-3 rounded-xl border border-slate-300 bg-white text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:border-transparent resize-y"
          ></textarea>

          <p id="limit-tip" class="mt-2 text-xs text-slate-500">
            Maximum 3000 characters.
          </p>
        </div>

        <div>
          <label class="block text-sm font-medium text-slate-700 mb-3">
            Polishing mode
          </label>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <label class="cursor-pointer rounded-xl border border-slate-300 p-4 hover:border-slate-400 transition">
              <div class="flex items-start gap-3">
                <input type="radio" name="mode" value="light" checked class="mt-1">
                <div>
                  <div class="font-medium text-slate-800">Light polish</div>
                  <div class="text-sm text-slate-600 mt-1">
                    Preserve the original meaning and sentence structure as much as possible.
                    Focus on grammar, wording, punctuation, and small stylistic improvements.
                  </div>
                </div>
              </div>
            </label>

            <label class="cursor-pointer rounded-xl border border-slate-300 p-4 hover:border-slate-400 transition">
              <div class="flex items-start gap-3">
                <input type="radio" name="mode" value="deep" class="mt-1">
                <div>
                  <div class="font-medium text-slate-800">Deep polish</div>
                  <div class="text-sm text-slate-600 mt-1">
                    Rewrite more substantially for a concise, formal, publication-ready SCI style
                    while preserving the original meaning.
                  </div>
                </div>
              </div>
            </label>
          </div>
        </div>

        <div class="flex flex-wrap gap-3">
          <button
            id="polish-btn"
            class="px-6 py-3 bg-slate-800 text-white font-medium rounded-xl hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:ring-offset-2 transition disabled:opacity-60 disabled:cursor-not-allowed"
          >
            Polish Text
          </button>

          <button
            id="clear-btn"
            class="px-6 py-3 bg-white text-slate-700 font-medium rounded-xl border border-slate-300 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:ring-offset-2 transition"
          >
            Clear
          </button>

          <button
            id="copy-btn"
            class="px-6 py-3 bg-white text-slate-700 font-medium rounded-xl border border-slate-300 hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-slate-400 focus:ring-offset-2 transition"
          >
            Copy Result
          </button>
        </div>

        <div>
          <div class="flex items-center justify-between mb-2">
            <label for="result-text" class="block text-sm font-medium text-slate-700">
              Polished result
            </label>
            <span id="status-text" class="text-xs text-slate-500">Ready</span>
          </div>

          <div
            id="result-text"
            class="w-full min-h-[220px] px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 text-slate-800 whitespace-pre-wrap"
          ></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const inputEl = document.getElementById("input-text");
    const charCountEl = document.getElementById("char-count");
    const limitTipEl = document.getElementById("limit-tip");
    const polishBtn = document.getElementById("polish-btn");
    const clearBtn = document.getElementById("clear-btn");
    const copyBtn = document.getElementById("copy-btn");
    const resultEl = document.getElementById("result-text");
    const statusTextEl = document.getElementById("status-text");

    const MAX_CHARS = 3000;

    function updateCharCount() {
      const length = inputEl.value.length;
      charCountEl.textContent = `${length} / ${MAX_CHARS}`;

      if (length > MAX_CHARS) {
        charCountEl.classList.remove("text-slate-500");
        charCountEl.classList.add("text-red-600");
        limitTipEl.textContent = "Text exceeds the maximum length. Please shorten it to 3000 characters or fewer.";
        limitTipEl.classList.remove("text-slate-500");
        limitTipEl.classList.add("text-red-600");
      } else {
        charCountEl.classList.remove("text-red-600");
        charCountEl.classList.add("text-slate-500");
        limitTipEl.textContent = "Maximum 3000 characters.";
        limitTipEl.classList.remove("text-red-600");
        limitTipEl.classList.add("text-slate-500");
      }
    }

    inputEl.addEventListener("input", updateCharCount);
    updateCharCount();

    polishBtn.addEventListener("click", async function () {
      const text = inputEl.value.trim();
      const mode = document.querySelector('input[name="mode"]:checked').value;

      resultEl.classList.remove("text-red-600");

      if (!text) {
        resultEl.textContent = "Please enter the text you want to polish.";
        resultEl.classList.add("text-red-600");
        statusTextEl.textContent = "No input";
        return;
      }

      if (text.length > MAX_CHARS) {
        resultEl.textContent = "Your text is too long. Please keep it within 3000 characters.";
        resultEl.classList.add("text-red-600");
        statusTextEl.textContent = "Too long";
        return;
      }

      polishBtn.disabled = true;
      statusTextEl.textContent = "Polishing...";
      resultEl.textContent = "Polishing your academic text...";

      try {
        const response = await fetch("/api/polish", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ text, mode })
        });

        const data = await response.json();

        if (!response.ok) {
          resultEl.textContent = data.error || "Polishing failed. Please try again.";
          resultEl.classList.add("text-red-600");
          statusTextEl.textContent = "Failed";
          return;
        }

        resultEl.textContent = data.polished || "";
        statusTextEl.textContent = "Done";
      } catch (error) {
        resultEl.textContent = "Polishing failed. Please try again.";
        resultEl.classList.add("text-red-600");
        statusTextEl.textContent = "Error";
      } finally {
        polishBtn.disabled = false;
      }
    });

    clearBtn.addEventListener("click", function () {
      inputEl.value = "";
      resultEl.textContent = "";
      statusTextEl.textContent = "Ready";
      resultEl.classList.remove("text-red-600");
      updateCharCount();
    });

    copyBtn.addEventListener("click", async function () {
      const text = resultEl.textContent.trim();

      if (!text) {
        statusTextEl.textContent = "Nothing to copy";
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        const oldText = copyBtn.textContent;
        copyBtn.textContent = "Copied!";
        statusTextEl.textContent = "Copied";
        setTimeout(() => {
          copyBtn.textContent = oldText;
          statusTextEl.textContent = "Done";
        }, 1500);
      } catch (error) {
        statusTextEl.textContent = "Copy failed";
      }
    });
  </script>
</body>
</html>
