<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>润思 - 学术文本润色</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#f5f7fb] text-slate-800 font-sans">
  <div class="min-h-screen flex flex-col">
    <!-- 顶部导航 -->
    <header class="border-b border-slate-200 bg-white/90 backdrop-blur">
      <div class="max-w-7xl mx-auto px-4 md:px-6 h-16 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-9 h-9 rounded-xl bg-blue-600 text-white flex items-center justify-center font-bold text-lg shadow-sm">
            润
          </div>
          <div>
            <h1 class="text-lg font-semibold text-slate-900 leading-none">润思</h1>
            <p class="text-xs text-slate-500 mt-1">学术文本润色工具</p>
          </div>
        </div>

        <div class="hidden md:flex items-center gap-3 text-sm text-slate-500">
          <span class="px-3 py-1.5 rounded-full bg-slate-100 border border-slate-200">论文润色</span>
          <span class="px-3 py-1.5 rounded-full bg-slate-100 border border-slate-200">摘要优化</span>
          <span class="px-3 py-1.5 rounded-full bg-slate-100 border border-slate-200">回复审稿人</span>
        </div>
      </div>
    </header>

    <!-- 主体 -->
    <main class="flex-1 max-w-7xl mx-auto w-full px-4 md:px-6 py-6 md:py-8">
      <!-- 顶部工具条 -->
      <div class="mb-5 rounded-2xl border border-slate-200 bg-white shadow-sm px-4 py-4 md:px-5">
        <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
          <div>
            <h2 class="text-xl font-semibold text-slate-900">润思 · Academic Polish</h2>
            <p class="text-sm text-slate-500 mt-1">
              适用于 SCI 论文、英文摘要、学术段落和审稿回复的英文润色。
            </p>
          </div>

          <div class="flex flex-wrap items-center gap-3">
            <div class="flex items-center rounded-xl border border-slate-200 bg-slate-50 p-1">
              <button
                id="mode-light"
                type="button"
                class="mode-btn px-4 py-2 rounded-lg text-sm font-medium bg-white text-slate-900 shadow-sm border border-slate-200"
                data-mode="light"
              >
                轻度润色
              </button>
              <button
                id="mode-deep"
                type="button"
                class="mode-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-600"
                data-mode="deep"
              >
                深度润色
              </button>
            </div>

            <div class="text-sm text-slate-500">
              <span id="char-count">0 / 3000</span>
            </div>
          </div>
        </div>
      </div>

      <!-- 双栏 -->
      <div class="grid grid-cols-1 xl:grid-cols-2 gap-5">
        <!-- 左侧输入 -->
        <section class="rounded-2xl border border-slate-200 bg-white shadow-sm overflow-hidden">
          <div class="h-14 border-b border-slate-200 px-5 flex items-center justify-between bg-white">
            <div>
              <div class="text-sm font-semibold text-slate-900">原文</div>
              <div class="text-xs text-slate-500 mt-0.5">请输入或粘贴需要润色的英文内容</div>
            </div>
            <div class="text-xs text-slate-500">输入区</div>
          </div>

          <div class="p-5">
            <textarea
              id="input-text"
              rows="18"
              placeholder="在此输入英文文本..."
              class="w-full resize-none rounded-2xl border border-slate-200 bg-white px-4 py-4 text-[15px] leading-7 text-slate-800 placeholder-slate-400 outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-100 transition"
            ></textarea>

            <div class="mt-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
              <div>
                <p id="mode-desc" class="text-sm text-slate-600">
                  当前为轻度润色：尽量保留原意和原句式，主要优化语法、用词和细节表达。
                </p>
                <p id="limit-tip" class="text-xs text-slate-500 mt-1">
                  最多支持 3000 个字符。
                </p>
              </div>

              <div class="flex flex-wrap gap-3">
                <button
                  id="clear-btn"
                  class="inline-flex items-center justify-center px-4 py-2.5 rounded-xl border border-slate-200 bg-white text-slate-700 text-sm font-medium hover:bg-slate-50 focus:outline-none focus:ring-4 focus:ring-slate-100 transition"
                >
                  清空
                </button>
                <button
                  id="polish-btn"
                  class="inline-flex items-center justify-center px-5 py-2.5 rounded-xl bg-blue-600 text-white text-sm font-medium hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-100 disabled:opacity-60 disabled:cursor-not-allowed transition"
                >
                  开始润色
                </button>
              </div>
            </div>
          </div>
        </section>

        <!-- 右侧输出 -->
        <section class="rounded-2xl border border-slate-200 bg-white shadow-sm overflow-hidden">
          <div class="h-14 border-b border-slate-200 px-5 flex items-center justify-between bg-white">
            <div>
              <div class="text-sm font-semibold text-slate-900">润色结果</div>
              <div class="text-xs text-slate-500 mt-0.5">输出优化后的学术英文</div>
            </div>
            <div id="status-text" class="text-xs text-slate-500">就绪</div>
          </div>

          <div class="p-5 flex flex-col min-h-[560px]">
            <div
              id="result-text"
              class="flex-1 rounded-2xl border border-slate-200 bg-[#f8faff] px-4 py-4 text-[15px] leading-7 text-slate-800 whitespace-pre-wrap"
            ></div>

            <div class="mt-4 flex flex-wrap gap-3 justify-end">
              <button
                id="copy-btn"
                class="inline-flex items-center justify-center px-4 py-2.5 rounded-xl border border-slate-200 bg-white text-slate-700 text-sm font-medium hover:bg-slate-50 focus:outline-none focus:ring-4 focus:ring-slate-100 transition"
              >
                复制结果
              </button>
            </div>
          </div>
        </section>
      </div>
    </main>

    <!-- 底部 -->
    <footer class="border-t border-slate-200 bg-white">
      <div class="max-w-7xl mx-auto px-4 md:px-6 py-4 flex flex-col md:flex-row md:items-center md:justify-between gap-2 text-sm text-slate-500">
        <div>润思 · 面向科研写作的英文润色工具</div>
        <div>支持轻度润色与深度润色两种模式</div>
      </div>
    </footer>
  </div>

  <script>
    const inputEl = document.getElementById("input-text");
    const resultEl = document.getElementById("result-text");
    const charCountEl = document.getElementById("char-count");
    const limitTipEl = document.getElementById("limit-tip");
    const statusTextEl = document.getElementById("status-text");
    const polishBtn = document.getElementById("polish-btn");
    const clearBtn = document.getElementById("clear-btn");
    const copyBtn = document.getElementById("copy-btn");
    const modeDescEl = document.getElementById("mode-desc");
    const modeLightBtn = document.getElementById("mode-light");
    const modeDeepBtn = document.getElementById("mode-deep");

    const MAX_CHARS = 3000;
    let currentMode = "light";

    function updateCharCount() {
      const length = inputEl.value.length;
      charCountEl.textContent = `${length} / ${MAX_CHARS}`;

      if (length > MAX_CHARS) {
        charCountEl.classList.remove("text-slate-500");
        charCountEl.classList.add("text-red-600");
        limitTipEl.textContent = "内容超出限制，请控制在 3000 个字符以内。";
        limitTipEl.classList.remove("text-slate-500");
        limitTipEl.classList.add("text-red-600");
      } else {
        charCountEl.classList.remove("text-red-600");
        charCountEl.classList.add("text-slate-500");
        limitTipEl.textContent = "最多支持 3000 个字符。";
        limitTipEl.classList.remove("text-red-600");
        limitTipEl.classList.add("text-slate-500");
      }
    }

    function setMode(mode) {
      currentMode = mode;

      if (mode === "deep") {
        modeDeepBtn.className = "mode-btn px-4 py-2 rounded-lg text-sm font-medium bg-white text-slate-900 shadow-sm border border-slate-200";
        modeLightBtn.className = "mode-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-600";
        modeDescEl.textContent = "当前为深度润色：在不改变原意的前提下，显著提升学术性、凝练度和 SCI 风格。";
      } else {
        modeLightBtn.className = "mode-btn px-4 py-2 rounded-lg text-sm font-medium bg-white text-slate-900 shadow-sm border border-slate-200";
        modeDeepBtn.className = "mode-btn px-4 py-2 rounded-lg text-sm font-medium text-slate-600";
        modeDescEl.textContent = "当前为轻度润色：尽量保留原意和原句式，主要优化语法、用词和细节表达。";
      }
    }

    inputEl.addEventListener("input", updateCharCount);

    modeLightBtn.addEventListener("click", () => setMode("light"));
    modeDeepBtn.addEventListener("click", () => setMode("deep"));

    polishBtn.addEventListener("click", async function () {
      const text = inputEl.value.trim();

      resultEl.classList.remove("text-red-600");

      if (!text) {
        resultEl.textContent = "请输入需要润色的内容。";
        resultEl.classList.add("text-red-600");
        statusTextEl.textContent = "未输入";
        return;
      }

      if (text.length > MAX_CHARS) {
        resultEl.textContent = "文本过长，请控制在 3000 个字符以内。";
        resultEl.classList.add("text-red-600");
        statusTextEl.textContent = "超出限制";
        return;
      }

      polishBtn.disabled = true;
      statusTextEl.textContent = "润色中...";
      resultEl.textContent = "正在润色，请稍候...";

      try {
        const response = await fetch("/api/polish", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            text,
            mode: currentMode
          })
        });

        const data = await response.json();

        if (!response.ok) {
          resultEl.textContent = data.error || "润色失败，请稍后重试。";
          resultEl.classList.add("text-red-600");
          statusTextEl.textContent = "失败";
          return;
        }

        resultEl.textContent = data.polished || "";
        statusTextEl.textContent = "已完成";
      } catch (error) {
        resultEl.textContent = "润色失败，请稍后重试。";
        resultEl.classList.add("text-red-600");
        statusTextEl.textContent = "错误";
      } finally {
        polishBtn.disabled = false;
      }
    });

    clearBtn.addEventListener("click", function () {
      inputEl.value = "";
      resultEl.textContent = "";
      resultEl.classList.remove("text-red-600");
      statusTextEl.textContent = "就绪";
      updateCharCount();
    });

    copyBtn.addEventListener("click", async function () {
      const text = resultEl.textContent.trim();

      if (!text) {
        statusTextEl.textContent = "无可复制内容";
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        const oldText = copyBtn.textContent;
        copyBtn.textContent = "已复制";
        statusTextEl.textContent = "复制成功";

        setTimeout(() => {
          copyBtn.textContent = oldText;
          statusTextEl.textContent = "已完成";
        }, 1500);
      } catch (error) {
        statusTextEl.textContent = "复制失败";
      }
    });

    updateCharCount();
    setMode("light");
  </script>
</body>
</html>
