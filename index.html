<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rinse Think</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-900 text-white min-h-screen">

<div class="max-w-6xl mx-auto px-6 py-12">

<!-- Logo -->
<div class="mb-10">

<h1 class="text-4xl font-bold">
Rinse Think
</h1>

<p class="text-slate-400 mt-2">
Rinse your mind, think clearly
</p>

</div>

<!-- 风格选择 -->

<div class="bg-slate-800 rounded-xl p-6 mb-6">

<h2 class="text-lg font-semibold mb-4">
选择润色风格
</h2>

<div class="flex gap-4">

<button id="simpleMode"
class="px-5 py-2 bg-blue-600 rounded-lg hover:bg-blue-700">
简单
</button>

<button id="businessMode"
class="px-5 py-2 bg-slate-700 rounded-lg hover:bg-slate-600">
商业
</button>

<button id="academicMode"
class="px-5 py-2 bg-slate-700 rounded-lg hover:bg-slate-600">
学术
</button>

</div>

</div>

<!-- 输入区域 -->

<div class="bg-slate-800 rounded-xl p-6 mb-6">

<h2 class="text-lg font-semibold mb-4">
输入文本
</h2>

<textarea
id="inputText"
rows="8"
class="w-full p-4 rounded-lg bg-slate-900 border border-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-500"
placeholder="请输入需要润色的文本..."
></textarea>

</div>

<!-- 按钮 -->

<div class="mb-6">

<button
id="polishBtn"
class="px-6 py-3 bg-blue-600 hover:bg-blue-700 rounded-lg font-semibold">
开始优化
</button>

</div>

<!-- 输出区域 -->

<div class="bg-slate-800 rounded-xl p-6">

<h2 class="text-lg font-semibold mb-4">
优化结果
</h2>

<div
id="outputText"
class="min-h-[120px] p-4 bg-slate-900 rounded-lg border border-slate-700">
</div>

</div>

</div>

<script>

let mode = "simple"

document.getElementById("simpleMode").onclick = () => mode = "simple"
document.getElementById("businessMode").onclick = () => mode = "business"
document.getElementById("academicMode").onclick = () => mode = "academic"

document.getElementById("polishBtn").onclick = async () => {

const text = document.getElementById("inputText").value

const response = await fetch("/api/polish", {
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
text:text,
mode:mode
})
})

const data = await response.json()

document.getElementById("outputText").innerText = data.result

}

</script>

</body>
</html>
