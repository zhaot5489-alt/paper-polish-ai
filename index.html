<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Academic Text Polisher</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="max-w-5xl w-full bg-white shadow-xl rounded-2xl p-8">

<h1 class="text-3xl font-bold text-center mb-6">
AI Academic Text Polisher
</h1>

<p class="text-center text-gray-500 mb-8">
Improve grammar, clarity, and academic tone using AI
</p>

<div class="grid md:grid-cols-2 gap-6">

<!-- 输入 -->
<div>
<label class="font-semibold">Input Text</label>

<textarea
id="inputText"
class="w-full mt-2 p-4 border rounded-lg h-64"
placeholder="Paste your academic text here..."
></textarea>

<button
onclick="polishText()"
class="mt-4 w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition"
>
Polish Text
</button>
</div>

<!-- 输出 -->
<div>
<label class="font-semibold">Polished Text</label>

<textarea
id="outputText"
class="w-full mt-2 p-4 border rounded-lg h-64 bg-gray-50"
placeholder="AI polished result will appear here..."
></textarea>

<button
onclick="copyText()"
class="mt-4 w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition"
>
Copy Result
</button>
</div>

</div>

<div id="loading" class="text-center text-gray-500 mt-4 hidden">
Processing...
</div>

</div>

<script>

async function polishText() {

const input = document.getElementById("inputText").value;

if(!input){
alert("Please enter text");
return;
}

document.getElementById("loading").classList.remove("hidden");

try {

const response = await fetch("/api/polish", {
method: "POST",
headers: {
"Content-Type": "application/json"
},
body: JSON.stringify({
text: input
})
});

const data = await response.json();

document.getElementById("outputText").value = data.result;

} catch (error) {

alert("API error");

}

document.getElementById("loading").classList.add("hidden");

}

function copyText(){

const text = document.getElementById("outputText");

text.select();
text.setSelectionRange(0, 99999);

navigator.clipboard.writeText(text.value);

alert("Copied!");

}

</script>

</body>
</html>
